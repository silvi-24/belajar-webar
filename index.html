<!DOCTYPE html>
<html>
<head>
    <title>AR Hello Kitty - Tanpa ARCore</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <!-- Manajemen Aset untuk memuat model 3D -->
        <a-assets>
            <a-asset-item id="hello-kitty-model" src="https://raw.githubusercontent.com/nethor-kun/asset-ar/main/hello_kitty.glb"></a-asset-item>
        </a-assets>

        <!-- Marker Hiro -->
        <a-marker preset="hiro">
            
            <!-- Mengganti a-box menjadi a-gltf-model -->
            <a-gltf-model src="#hello-kitty-model"
                          position="0 0 0" 
                          scale="0.5 0.5 0.5"
                          animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
            </a-gltf-model>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
